name: Deploy to Firebase

on:
  push:
    branches:
      - main
      - production
  pull_request:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            functions/package-lock.json
            admin/package-lock.json

      - name: Install Functions dependencies
        run: |
          cd functions
          npm ci

      - name: Build Functions
        run: |
          cd functions
          npm run build

      - name: Install Admin dependencies
        run: |
          cd admin
          npm ci

      - name: Build Admin Panel
        run: |
          cd admin
          npm run build

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: groceryos-61a05
          channelId: live

      - name: Deploy Firestore Rules & Indexes
        run: |
          npm install -g firebase-tools
          firebase deploy --only firestore:rules,firestore:indexes,storage --token "${{ secrets.FIREBASE_TOKEN }}" --project groceryos-61a05

      - name: Deploy Cloud Functions
        run: |
          firebase deploy --only functions --token "${{ secrets.FIREBASE_TOKEN }}" --project groceryos-61a05
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
