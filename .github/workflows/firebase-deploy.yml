name: Deploy to Firebase (UAT)

on:
  push:
    branches:
      - main
      - uat
  pull_request:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to UAT
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Functions dependencies
        run: |
          cd functions
          npm install

      - name: Build Functions
        run: |
          cd functions
          npm run build

      - name: Install Admin dependencies
        run: |
          cd admin
          npm install

      - name: Copy shared folder to admin
        run: |
          cp -r shared admin/shared

      - name: Create UAT Environment File
        run: |
          cd admin
          echo "${{ secrets.ENV_FILE_UAT }}" > .env.production

      - name: Build Admin Panel (UAT)
        run: |
          cd admin
          npm run build

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate with Service Account
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > $HOME/gcloud-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcloud-key.json" >> $GITHUB_ENV

      - name: Deploy Firestore Rules & Indexes
        run: |
          firebase deploy --only firestore:rules,firestore:indexes --project groceryos-61a05
          
      - name: Deploy Storage Rules
        run: |
          firebase deploy --only storage --project groceryos-61a05

      - name: Write functions .env
        run: |
          cat > functions/.env << 'EOF'
          TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_VERIFY_SERVICE_SID=${{ secrets.TWILIO_VERIFY_SERVICE_SID }}
          EOF
          # Strip leading spaces from heredoc
          sed -i 's/^ *//' functions/.env

      - name: Deploy Cloud Functions
        run: |
          firebase deploy --only functions --project groceryos-61a05 --force

      - name: Set IAM invoker policy for HTTP/callable functions
        run: |
          gcloud auth activate-service-account --key-file=$HOME/gcloud-key.json
          for fn in signInWithPhone razorpayWebhook placeOrder verifyPayment autoAssignAgent setStaffRole sendOtp verifyOtp; do
            gcloud functions add-iam-policy-binding $fn \
              --region=us-central1 \
              --project=groceryos-61a05 \
              --member=allUsers \
              --role=roles/cloudfunctions.invoker || echo "IAM for $fn already set or skipped"
          done

      - name: Deploy Admin Hosting
        run: |
          firebase deploy --only hosting --project groceryos-61a05
