name: Deploy to Firebase (UAT)

on:
  push:
    branches:
      - main
      - uat
  pull_request:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to UAT
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Functions dependencies
        run: |
          cd functions
          npm install

      - name: Build Functions
        run: |
          cd functions
          npm run build

      - name: Install Admin dependencies
        run: |
          cd admin
          npm install

      - name: Copy shared folder to admin
        run: |
          cp -r shared admin/shared

      - name: Create UAT Environment File
        run: |
          cd admin
          echo "${{ secrets.ENV_FILE_UAT }}" > .env.production

      - name: Build Admin Panel (UAT)
        run: |
          cd admin
          npm run build

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate with Service Account
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > $HOME/gcloud-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcloud-key.json" >> $GITHUB_ENV

      - name: Deploy Firestore Rules & Indexes (Skipped - needs permissions)
        run: |
          echo "⚠️  Skipping Firestore rules deployment"
          echo "Deploy manually: firebase deploy --only firestore:rules,firestore:indexes,storage"
          echo "See FIX_SERVICE_ACCOUNT_PERMISSIONS.md"

      - name: Deploy Cloud Functions (Skipped - needs permissions)
        run: |
          echo "⚠️  Skipping Cloud Functions deployment"
          echo "Deploy manually: firebase deploy --only functions"
          echo "See FIX_SERVICE_ACCOUNT_PERMISSIONS.md"

      - name: Deploy Admin Hosting (Skipped - needs permissions)
        run: |
          echo "⚠️  Skipping Hosting deployment"
          echo "Deploy manually: firebase deploy --only hosting"
          echo "See FIX_SERVICE_ACCOUNT_PERMISSIONS.md"
          
      - name: Deployment Summary
        run: |
          echo "✅ Admin Panel built successfully!"
          echo "✅ Cloud Functions built successfully!"
          echo ""
          echo "⚠️  Manual deployment required due to service account permissions"
          echo ""
          echo "To deploy everything manually:"
          echo "1. Fix service account permissions (see FIX_SERVICE_ACCOUNT_PERMISSIONS.md)"
          echo "2. Run: firebase deploy --project groceryos-61a05"
          echo ""
          echo "Or deploy individually:"
          echo "  firebase deploy --only firestore:rules,firestore:indexes"
          echo "  firebase deploy --only functions"
          echo "  firebase deploy --only hosting"
